name: Deploy to GitHub Pages

on:
  push:
    branches:
      - feat/restaurant-app-full
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack and prepare pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.8.1 --activate

      - name: Install dependencies (restaurant-app)
        working-directory: restaurant-app
        run: pnpm install

      - name: Build (restaurant-app)
        working-directory: restaurant-app
        run: pnpm build # next export 제거

      - name: Deploy to GitHub Pages
        working-directory: restaurant-app
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./restaurant-app/out
